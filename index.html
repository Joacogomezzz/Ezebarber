<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eze Barber - Sistema de Citas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="logo">✂️ Eze Barber</div>
            <h1>Bienvenido</h1>

            <div id="google-login-button" style="margin-bottom: 20px;"></div>

            <form id="completeProfileForm" class="hidden">
                <h2 style="text-align: center; margin-bottom: 20px; font-size: 20px;">Completa tu perfil</h2>

                <div class="form-group">
                    <label for="profileName">Nombre</label>
                    <input type="text" id="profileName" required placeholder="Tu nombre">
                </div>

                <div class="form-group">
                    <label for="profileLastname">Apellido</label>
                    <input type="text" id="profileLastname" required placeholder="Tu apellido">
                </div>

                <div class="form-group">
                    <label for="profilePhone">Teléfono</label>
                    <input type="tel" id="profilePhone" required placeholder="+34 600 000 000">
                </div>

                <button type="submit" class="btn-primary">Continuar</button>
            </form>

            <div id="loginError" class="error-message"></div>
        </div>
    </div>

    <!-- Pantalla de Cliente -->
    <div id="clientScreen" class="screen">
        <div class="container">
            <header>
                <h1>✂️ Eze Barber</h1>
                <div class="user-info">
                    <span id="userDisplay"></span>
                    <button onclick="logout()" class="btn-secondary">Salir</button>
                </div>
            </header>

            <main>
                <!-- WIZARD CONTAINER -->
                <div class="wizard-container">
                    <!-- Progress Bar -->
                    <div class="wizard-progress">
                        <span class="progress-text" id="progressText">Paso 1 de 4</span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>

                    <!-- Step 1: Servicio -->
                    <div class="wizard-step" id="step1">
                        <h2>Selecciona un servicio</h2>
                        <div class="services-grid" id="servicesGrid"></div>
                        <button type="button" class="btn-primary btn-next" onclick="goToStep(2)">Siguiente</button>
                    </div>

                    <!-- Step 2: Día -->
                    <div class="wizard-step hidden" id="step2">
                        <h2>Elige un día</h2>
                        <div class="days-scroll" id="daysScroll"></div>
                        <div class="wizard-actions">
                            <button type="button" class="btn-secondary" onclick="goToStep(1)">Atrás</button>
                            <button type="button" class="btn-primary" onclick="goToStep(3)">Siguiente</button>
                        </div>
                    </div>

                    <!-- Step 3: Horario -->
                    <div class="wizard-step hidden" id="step3">
                        <h2>Elige una hora</h2>
                        <div class="times-grid" id="timesGrid"></div>
                        <div class="wizard-actions">
                            <button type="button" class="btn-secondary" onclick="goToStep(2)">Atrás</button>
                            <button type="button" class="btn-primary" onclick="goToStep(4)">Siguiente</button>
                        </div>
                    </div>

                    <!-- Step 4: Confirmación -->
                    <div class="wizard-step hidden" id="step4">
                        <h2>Confirma tu turno</h2>
                        <div class="confirmation-summary">
                            <div class="summary-item">
                                <span class="summary-label">Servicio</span>
                                <span class="summary-value" id="confirmService">-</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Día</span>
                                <span class="summary-value" id="confirmDate">-</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Hora</span>
                                <span class="summary-value" id="confirmTime">-</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="notes">Notas (opcional)</label>
                            <textarea id="notes" placeholder="Especificaciones de tu corte..."></textarea>
                        </div>
                        <div id="bookingError" class="error-message"></div>
                        <div class="wizard-actions">
                            <button type="button" class="btn-secondary" onclick="goToStep(3)">Atrás</button>
                            <button type="button" class="btn-primary btn-large" onclick="confirmBooking()">Confirmar Turno</button>
                        </div>
                    </div>
                </div>

                <div id="bookingSuccess" class="success-message hidden"></div>
            </main>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
